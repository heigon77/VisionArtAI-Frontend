name: Deploy Angular → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Instalar dependências
        working-directory: frontend
        run: npm ci

      - name: Build production
        working-directory: frontend
        run: |
          npx ng build \
            --configuration production \
            --base-href "/VisionArtAI-Frontend/"

      - name: Copiar index.html como 404.html (SPA fallback)
        run: cp frontend/dist/frontend/browser/index.html \
                frontend/dist/frontend/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist/frontend/browser

      - uses: actions/deploy-pages@v4
        id: deploy
