name: Deploy Angular → GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json   # ← raiz do repo

      - name: Instalar dependências
        run: npm ci                                   # ← sem working-directory

      - name: Build production
        run: |
          npx ng build \
            --configuration production \
            --base-href "/VisionArtAI-Frontend/"      # ← nome do seu repo

      - name: SPA fallback
        run: cp dist/VisionArtAI-Frontend/browser/index.html \
                dist/VisionArtAI-Frontend/browser/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist/VisionArtAI-Frontend/browser   # ← pasta gerada pelo ng build

      - uses: actions/deploy-pages@v4
        id: deploy